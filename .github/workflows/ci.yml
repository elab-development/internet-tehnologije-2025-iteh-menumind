name: CI/CD

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

  docker-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: menumind-ai:${{ github.sha }}

  deploy-vercel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-and-build
      - docker-image
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://menumind-ai.vercel.app
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: secrets
        shell: bash
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Vercel secrets are missing (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID). Deployment is skipped."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.secrets.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Pull Vercel project settings
        if: steps.secrets.outputs.ready == 'true'
        run: npx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build with Vercel
        if: steps.secrets.outputs.ready == 'true'
        run: npx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel (Production)
        if: steps.secrets.outputs.ready == 'true'
        id: deploy
        run: |
          DEPLOYMENT_URL=$(npx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}")
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Deployment URL
        if: steps.secrets.outputs.ready == 'true'
        run: echo "Production deployed to ${{ steps.deploy.outputs.deployment_url }}"

      - name: Skip deploy (missing secrets)
        if: steps.secrets.outputs.ready != 'true'
        run: echo "Skipping deployment because Vercel secrets are not configured."
