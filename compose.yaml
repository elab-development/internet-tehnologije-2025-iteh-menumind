services:
  web:
    build: .
    container_name: menumind-app
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17
    container_name: menumind-postgres
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - menumind_pgdata:/var/lib/postgresql/data
      - ./drizzle/:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seed:
    build:
      context: .
      target: builder
    container_name: menumind-seed
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "/docker/seed-entrypoint.sh"]
    restart: "no"

volumes:
  menumind_pgdata:
